<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Cardona</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #18181b;
      --surface: #232328;
      --border: #2e2e35;
      --text: #e4e4e7;
      --muted: #9d9da3;
      --accent: #a78bfa;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 36rem;
      width: 100%;
    }

    .card__name {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .card__role {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .card__bio {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .card__bio a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .card__bio a:hover {
      opacity: 0.75;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .projects__label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #52525b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .project {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .project:hover {
      border-color: #3f3f47;
      background: #28282e;
    }

    .project__icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #2e2e35;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .project__icon svg {
      width: 16px;
      height: 16px;
      fill: var(--muted);
    }

    .project__info {
      flex: 1;
      min-width: 0;
    }

    .project__name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.1rem;
    }

    .project__desc {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project__arrow {
      color: #52525b;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: var(--text);
    }

    .links svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="card__name">Kevin Cardona</h1>
    <p class="card__role">Full-Stack Engineer · <a href="https://www.vailsys.com/" style="color: var(--muted); text-decoration: none;">Vail Systems</a> · Purdue CS</p>
    <p class="card__bio">
      Building <a href="https://audiobooky.io/">Audiobooky</a> — an audiobook player for everyone. Day job at <a href="https://www.vailsys.com/">Vail Systems</a>.
    </p>

    <section class="projects" aria-label="Projects">
      <p class="projects__label">Projects</p>

      <a href="https://audiobooky.io/" class="project" target="_blank" rel="noopener">
        <div class="project__icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.75 3.94L5.25 8.06v7.88l13.5-4.12V3.94zM5.25 18.81V20.5h15v-1.69L5.25 18.81z"/></svg>
        </div>
        <div class="project__info">
          <p class="project__name">Audiobooky</p>
          <p class="project__desc">Audiobook player for everyone</p>
        </div>
        <span class="project__arrow">↗</span>
      </a>

      <a href="#" class="project" onclick="return false;">
        <div class="project__icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l4.59-4.58L18 11l-6 6z"/></svg>
        </div>
        <div class="project__info">
          <p class="project__name">Chess App</p>
          <p class="project__desc">coming soon</p>
        </div>
        <span class="project__arrow">↗</span>
      </a>

      <a href="#" class="project" onclick="return false;">
        <div class="project__icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15 7.5V2H9v5.5l3 3 3-3zM7.5 9H2v6h5.5l3-3-3-3zM9 16.5V22h6v-5.5l-3-3-3 3zM16.5 9l-3 3 3 3H22V9h-5.5z"/></svg>
        </div>
        <div class="project__info">
          <p class="project__name">Vimkeys</p>
          <p class="project__desc">coming soon</p>
        </div>
        <span class="project__arrow">↗</span>
      </a>
    </section>

    <nav class="links">
      <a href="https://github.com/kevincardona" target="_blank" rel="noopener">

        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        LinkedIn
      </a>
    </nav>
  </main>
</body>
</html>
