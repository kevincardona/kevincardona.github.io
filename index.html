<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kevin Cardona</title>
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: #111111;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 32rem;
      width: 100%;
    }

    .card__name {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .card__role {
      font-size: 1.1rem;
      font-weight: 400;
      color: #888888;
      margin-bottom: 1.5rem;
    }

    .card__bio {
      font-size: 1rem;
      font-weight: 400;
      color: #aaaaaa;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .card__bio a {
      color: #e0e0e0;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #444444;
      transition: text-decoration-color 0.2s;
    }

    .card__bio a:hover {
      text-decoration-color: #e0e0e0;
    }

    .card__links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .card__links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #888888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .card__links a:hover {
      color: #e0e0e0;
    }

    .card__links svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="card__name">Kevin Cardona</h1>
    <p class="card__role">Full-Stack Engineer</p>
    <p class="card__bio">
      Building at <a href="https://www.vailsys.com/">Vail Systems</a>.
      Purdue CS grad. I write software, occasionally ship something interesting,
      and occasionally stream on Twitch.
    </p>

          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

  </main>
</body>
</html>
