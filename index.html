<style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #18181b;
      --surface: #232328;
      --border: #2e2e35;
      --text: #e4e4e7;
      --muted: #9d9da3;
      --accent: #a78bfa;
    }

    /* ─── Animated mesh background ─── */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0;
      animation: orb-appear 2s ease-out forwards;
    }

    /* Soft purple — top-left */
    .orb-1 {
      width: 480px;
      height: 480px;
      top: -120px;
      left: -100px;
      background: radial-gradient(circle, rgba(147, 112, 219, 0.35) 0%, transparent 70%);
      animation: drift-1 28s ease-in-out infinite, pulse-1 18s ease-in-out infinite;
    }

    /* Soft blue — top-right */
    .orb-2 {
      width: 560px;
      height: 560px;
      top: -80px;
      right: -140px;
      background: radial-gradient(circle, rgba(80, 130, 220, 0.3) 0%, transparent 70%);
      animation: drift-2 34s ease-in-out infinite, pulse-2 22s ease-in-out infinite;
    }

    /* Teal accent — bottom-right */
    .orb-3 {
      width: 400px;
      height: 400px;
      bottom: -60px;
      right: 80px;
      background: radial-gradient(circle, rgba(72, 199, 200, 0.22) 0%, transparent 70%);
      animation: drift-3 26s ease-in-out infinite, pulse-3 15s ease-in-out infinite;
    }

    /* Deep violet — center-left */
    .orb-4 {
      width: 360px;
      height: 360px;
      top: 35%;
      left: -80px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
      animation: drift-4 30s ease-in-out infinite, pulse-1 20s ease-in-out infinite;
    }

    /* Ice blue — bottom-left */
    .orb-5 {
      width: 320px;
      height: 320px;
      bottom: -40px;
      left: 30%;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.18) 0%, transparent 70%);
      animation: drift-5 24s ease-in-out infinite, pulse-2 17s ease-in-out infinite;
    }

    /* Keyframes — appear */
    @keyframes orb-appear {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Drift — gentle floating paths */
    @keyframes drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%       { transform: translate(40px, 30px) scale(1.04); }
      50%       { transform: translate(15px, 60px) scale(0.97); }
      75%       { transform: translate(-25px, 25px) scale(1.02); }
    }
    @keyframes drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      30%       { transform: translate(-50px, 40px) scale(1.05); }
      60%       { transform: translate(-20px, 70px) scale(0.96); }
      80%       { transform: translate(30px, 30px) scale(1.03); }
    }
    @keyframes drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      35%       { transform: translate(-35px, -45px) scale(1.06); }
      65%       { transform: translate(25px, -20px) scale(0.98); }
    }
    @keyframes drift-4 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      20%       { transform: translate(55px, -25px) scale(1.03); }
      55%       { transform: translate(30px, 50px) scale(0.95); }
      80%       { transform: translate(-15px, 20px) scale(1.04); }
    }
    @keyframes drift-5 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-30px, 35px) scale(1.05); }
      70%       { transform: translate(20px, -30px) scale(0.97); }
    }

    /* Pulse — opacity/scale breathing */
    @keyframes pulse-1 {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.8; }
    }
    @keyframes pulse-2 {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 0.7; }
    }
    @keyframes pulse-3 {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0.75; }
    }

    /* ─── Page ─── */
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 36rem;
      width: 100%;
    }

    .card__name {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .card__role {
      font-size: 1rem;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .card__bio {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .card__bio a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .card__bio a:hover {
      opacity: 0.75;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .projects__label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #52525b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .project {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .project:hover {
      border-color: #3f3f47;
      background: #28282e;
    }

    .project__icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: #2e2e35;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .project__icon svg {
      width: 16px;
      height: 16px;
      fill: var(--muted);
    }

    .project__info {
      flex: 1;
      min-width: 0;
    }

    .project__name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.1rem;
    }

    .project__desc {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project__arrow {
      color: #52525b;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: var(--text);
    }

    .links svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }


  </style>

  <!-- Mouse-reactive orb drift + link preview tooltip -->
  <script>
    (function () {
      const orbs = document.querySelectorAll('.orb');
      const len = orbs.length;
      const r = 35; // max px shift
      let mx = window.innerWidth / 2;
      let my = window.innerHeight / 2;
      let t = 0;

      window.addEventListener('mousemove', function (e) {
        mx = e.clientX;
        my = e.clientY;
      });

      function tick() {
        t++;
        orbs.forEach(function (orb, i) {
          // each orb gets a slightly different phase and axis preference
          var phase = (t + i * 47) * 0.008;
          var ax = Math.sin(phase) * r * 0.5;
          var ay = Math.cos(phase * 1.3) * r * 0.3;

          // cursor attraction: gentle pull toward mouse (very subtle)
          var dx = (mx / window.innerWidth - 0.5) * (i % 2 === 0 ? 1 : -1) * r * 0.25;
          var dy = (my / window.innerHeight - 0.5) * (i % 3 === 0 ? 1 : -1) * r * 0.2;

          orb.style.transform =
            'translate(' + (ax + dx) + 'px, ' + (ay + dy) + 'px)';
        });
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();
  </script>
